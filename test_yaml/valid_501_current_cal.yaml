axioms:
  current_limit_relation:
    equation: "Imax = Vbe/R2"
  base_current_relation:
    equation: "Ib = Ic/beta"
  bias_voltage_relation:
    equation: "Vr1 = Vs - 2*Vbe"
  bias_resistor_relation:
    equation: "R1 = Vr1/Ib"
sense_resistor_solve:
  equation: |+
    Imax = Vbe/R2 -> Imax*R2 = Vbe
    Imax*R2 = Vbe -> R2 = Vbe/Imax
calculations:
  eval_current_limit:
    vars: ["Vbe", "R2"] # Valid
    values: [0.6, 30.0] # Valid
    equation: "Vbe/R2"
    tolerance: 0.000001
    expected_value: 0.02
    expected_symbol: "Imax"
  eval_sense_resistor:
    vars: ["Vbe", "Imax"]
    values: [0.6, 0.02]
    equation: "Vbe/Imax"
    tolerance: 0.000001
    expected_value: 30.0
    expected_symbol: "R2"