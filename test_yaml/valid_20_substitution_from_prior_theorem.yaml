axioms:
  voltage_current_resistance_equation:
    vars: ["V", "I", "R"]
    equation: "V = I*R"
  electrical_power_equation:
    vars: ["V", "I", "P"]
    equation: "P = V*I"
rearrange_equation:
  vars: ["V", "I", "R"]
  equation: |+
    V = I*R -> I = V/R
electrical_current_resistance_power_equation:
  vars: ["V", "I", "P", "R"]
  equation: |+
    P = V*I ; I = V/R -> P = (V^2)/R
