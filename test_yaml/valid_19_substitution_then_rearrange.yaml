axioms:
  voltage_current_resistance_equation:
    vars: ["V", "I", "R"]
    equation: "V = I*R"
  electrical_power_equation:
    vars: ["V", "I", "P"]
    equation: "P = V*I"
electrical_current_resistance_power_equation:
  vars: ["V", "I", "P", "R"]
  equation: |+
    P = V*I ; V = I*R -> P = (I^2)*R
    P = (I^2)*R -> P/R = (I^2)
